<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad Player Controller</title>
    <style>
        :root {
            --color-a: #ff5252;
            --color-b: #448aff;
            --color-c: #ffab40;
            --color-d: #69f0ae;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        .player-info {
            background: #222;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 答題按鈕佈局 */
        .grid-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            padding: 10px 0;
        }

        .mc-button {
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 0 rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .mc-button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        .btn-a { background-color: var(--color-a); }
        .btn-b { background-color: var(--color-b); }
        .btn-c { background-color: var(--color-c); }
        .btn-d { background-color: var(--color-d); }

        .status-msg {
            text-align: center;
            height: 40px;
            font-size: 1.2rem;
            color: #aaa;
        }

        #vibration-feedback {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="player-info">
            <div>
                <span style="color: #888;">PLAYER:</span>
                <strong id="player-name">Player A</strong>
            </div>
            <div>
                <span style="color: #888;">SCORE:</span>
                <strong id="player-score" style="color: gold;">0</strong>
            </div>
        </div>
    </header>

    <div id="status-bar" class="status-msg">請選擇一個答案</div>

    <div class="grid-container">
        <button class="mc-button btn-a" onclick="submitAnswer('A')">A</button>
        <button class="mc-button btn-b" onclick="submitAnswer('B')">B</button>
        <button class="mc-button btn-c" onclick="submitAnswer('C')">C</button>
        <button class="mc-button btn-d" onclick="submitAnswer('D')">D</button>
    </div>

    <div id="vibration-feedback"></div>

    <script>
        // 建立一個頻道用於同瀏覽器測試
        const bc = new BroadcastChannel('game_channel');
        
        let currentScore = 0;
        let playerName = "Player A"; // 實際應用中這應由登入決定

        function submitAnswer(choice) {
            // 視覺回饋：iPad 震動模擬 (閃爍一下)
            const feedback = document.getElementById('vibration-feedback');
            feedback.style.opacity = '0.2';
            setTimeout(() => feedback.style.opacity = '0', 50);

            document.getElementById('status-bar').innerText = `已選擇: ${choice}`;
            document.getElementById('status-bar').style.color = 'white';

            // 發送數據到 Console 頁面
            bc.postMessage({
                type: 'PLAYER_UPDATE',
                data: {
                    name: playerName,
                    answer: choice,
                    timestamp: Date.now()
                }
            });

            // 測試用：每按一次按鈕隨機加分
            if (Math.random() > 0.5) {
                currentScore += 10;
                document.getElementById('player-score').innerText = currentScore;
            }
        }

        // 接收來自 Console 的訊息 (例如：下一題、遊戲結束)
        bc.onmessage = (ev) => {
            if (ev.data.type === 'NEXT_QUESTION') {
                document.getElementById('status-bar').innerText = "新題目已開始！";
                document.getElementById('status-bar').style.color = '#00e676';
            }
        };
    </script>
</body>
</html>
