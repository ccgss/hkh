<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON RACER - Professional Sync</title>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #000; --blue: #00ffff; --hud-bg: rgba(20, 20, 20, 0.9); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        /* Pages */
        .page { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        .active-page { display: flex; }

        /* Main Header */
        #game-header { 
            height: 140px; background: #111; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 30px; border-bottom: 4px solid var(--blue); box-sizing: border-box;
        }

        #qrcode-container { background: white; padding: 10px; border-radius: 8px; display: block; }

        #main-layout { position: relative; flex: 1; width: 100%; display: flex; overflow: hidden; background: #000; }

        /* HUD Sidebar */
        #player-section { 
            position: absolute; left: 15px; top: 15px; bottom: 15px;
            width: 200px; background: var(--hud-bg); 
            border: 1px solid var(--blue); border-radius: 12px; padding: 12px; 
            z-index: 10; overflow-y: auto;
        }

        #playground { flex: 1; height: 100%; position: relative; }
        canvas { display: block; width: 100%; height: 100%; }

        /* Player Cards */
        .player-card { 
            background: rgba(40,40,40,0.8); padding: 10px; margin-bottom: 8px; 
            border-radius: 6px; border-left: 5px solid #333; font-size: 13px;
        }
        .online { border-left-color: var(--blue); box-shadow: 0 0 10px rgba(0,255,255,0.2); }

        /* iPad Buttons */
        .grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .mc-btn { border: none; border-radius: 20px; font-size: 4rem; font-weight: bold; color: white; cursor: pointer; }
        .on-1 { background: #ff5252; } .on-2 { background: #448aff; } .on-3 { background: #ffab40; } .on-4 { background: #69f0ae; }
    </style>
</head>
<body>

    <div id="console-view" class="page">
        <header id="game-header">
            <div id="qrcode-container"><div id="qrcode"></div></div>
            <div style="text-align:center">
                <h1 id="console-title" style="margin:0; color:var(--blue); font-size: 2.8rem; text-shadow: 0 0 15px var(--blue);">SYSTEM LOADING</h1>
                <div id="conn-info" style="font-size:16px; color:#666; margin-top:5px;">CONNECTING TO BROKER...</div>
            </div>
            <div id="timer" style="font-size:3.5rem; font-family: monospace; color:var(--blue);">00:30</div>
        </header>
        <div id="main-layout">
            <aside id="player-section"><div id="player-list"></div></aside>
            <main id="playground"><canvas id="trackCanvas"></canvas></main>
        </div>
    </div>

    <div id="lobby-view" class="page" style="align-items:center; justify-content:center; background:#050505;">
        <h1 style="color:var(--blue); margin-bottom:30px;">JOIN NEON RACER</h1>
        <div id="lane-btns" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; width:90%; max-width:500px;"></div>
    </div>

    <div id="player-view" class="page">
        <div id="p-header" style="padding:25px; text-align:center; background:#111; font-weight:bold; border-bottom:4px solid var(--blue); font-size:1.8rem;">LANE X</div>
        <div class="grid">
            <button class="mc-btn on-1" ontouchstart="send(1)" ontouchend="send(0)">A</button>
            <button class="mc-btn on-2" ontouchstart="send(2)" ontouchend="send(0)">B</button>
            <button class="mc-btn on-3" ontouchstart="send(3)" ontouchend="send(0)">C</button>
            <button class="mc-btn on-4" ontouchstart="send(4)" ontouchend="send(0)">D</button>
        </div>
    </div>

<script>
    // --- Configuration ---
    const ROOM_ID = "NEON_ARENA_2026_FINAL"; // Unique ID
    const BROKER = "wss://broker.emqx.io:8084/mqtt";
    const client = mqtt.connect(BROKER);

    const urlParams = new URLSearchParams(window.location.search);
    const role = urlParams.get('role'); // main, player, or null(sub)
    let myLane = null;

    let players = Array.from({length: 10}, (_, i) => ({
        id: i+1, online: false, mark: 0, btn: 0, lastSeen: 0, color: `hsl(${i*36}, 100%, 65%)`
    }));

    // --- MQTT Logic ---
    client.on('connect', () => {
        console.log("Connected as:", role || "sub");
        document.getElementById('conn-info').innerText = "NETWORK ONLINE ✅";
        document.getElementById('conn-info').style.color = "#00e676";

        if (role === 'main') {
            document.getElementById('console-title').innerText = "MAIN CONSOLE";
            client.subscribe(`game/${ROOM_ID}/player/+`);
            // Sync broadcast
            setInterval(syncStateToSub, 100);
        } else if (role === 'player') {
            // Players don't subscribe to anything for performance
        } else {
            document.getElementById('console-title').innerText = "SUB CONSOLE";
            client.subscribe(`game/${ROOM_ID}/state`);
        }
    });

    client.on('message', (topic, msg) => {
        const data = JSON.parse(msg.toString());

        if (topic.endsWith('/state')) {
            // SUB CONSOLE receives state
            if (role !== 'main' && role !== 'player') {
                data.forEach((ps, i) => {
                    players[i].online = ps.online;
                    players[i].mark = ps.mark;
                    players[i].btn = ps.btn;
                });
                updatePlayerListUI();
            }
        } else if (topic.includes('/player/')) {
            // MAIN CONSOLE receives input
            if (role === 'main') {
                const laneId = parseInt(topic.split('/').pop());
                const p = players[laneId - 1];
                if (p) {
                    p.online = true;
                    p.btn = data.btn;
                    p.lastSeen = Date.now();
                    if (data.btn > 0) p.mark += 0.5;
                    updatePlayerListUI();
                }
            }
        }
    });

    // --- Core Functions ---
    window.onload = () => {
        if (role === 'player') {
            setupPlayerLobby();
        } else {
            setupConsoleView();
        }
    };

    function setupConsoleView() {
        showPage('console-view');
        updatePlayerListUI();
        
        // Generate QR Code
        const qrUrl = window.location.origin + window.location.pathname + "?role=player";
        new QRCode(document.getElementById("qrcode"), { 
            text: qrUrl, width: 120, height: 120, correctLevel: QRCode.CorrectLevel.M 
        });

        initCanvas();
    }

    function setupPlayerLobby() {
        showPage('lobby-view');
        const grid = document.getElementById('lane-btns');
        grid.innerHTML = ""; // Clear
        for(let i=1; i<=10; i++) {
            const b = document.createElement('button');
            b.style.cssText = "padding:25px; background:#111; border:2px solid var(--blue); color:#fff; border-radius:12px; font-weight:bold; font-size:1.2rem;";
            b.innerText = "LANE " + i;
            b.onclick = () => {
                myLane = i;
                document.getElementById('p-header').innerText = "LANE " + i;
                showPage('player-view');
                // Send join signal immediately
                send(0);
                // Keep-alive
                setInterval(() => send(0), 1500);
            };
            grid.appendChild(b);
        }
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
    }

    function send(code) {
        if (myLane && client.connected) {
            client.publish(`game/${ROOM_ID}/player/${myLane}`, JSON.stringify({ btn: code }));
        }
    }

    function syncStateToSub() {
        if (role !== 'main') return;
        const state = players.map(p => ({ id: p.id, online: p.online, mark: p.mark, btn: p.btn }));
        client.publish(`game/${ROOM_ID}/state`, JSON.stringify(state));
    }

    function updatePlayerListUI() {
        const list = document.getElementById('player-list');
        if (!list) return;
        list.innerHTML = players.map(p => `
            <div class="player-card ${p.online ? 'online' : ''}">
                <div style="display:flex; justify-content:space-between; font-weight:bold;">
                    <span>LANE ${p.id}</span>
                    <span style="color:var(--blue)">${Math.floor(p.mark)}m</span>
                </div>
                <div style="display:flex; gap:3px; margin-top:8px;">
                    <div style="flex:1; height:12px; background:${p.btn==1?'#ff5252':'#222'}"></div>
                    <div style="flex:1; height:12px; background:${p.btn==2?'#448aff':'#222'}"></div>
                    <div style="flex:1; height:12px; background:${p.btn==3?'#ffab40':'#222'}"></div>
                    <div style="flex:1; height:12px; background:${p.btn==4?'#69f0ae':'#222'}"></div>
                </div>
            </div>
        `).join('');
    }

    function initCanvas() {
        const canvas = document.getElementById('trackCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('playground');

        const resize = () => {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        };
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const sw = canvas.width * 0.3; 
            const baseR = canvas.height * 0.15;
            const gap = canvas.height * 0.035;

            players.forEach((p, i) => {
                const r = baseR + (i * gap);
                ctx.strokeStyle = p.online ? "rgba(0, 255, 255, 0.8)" : "rgba(255,255,255,0.05)";
                ctx.lineWidth = p.online ? 3 : 1;
                ctx.beginPath();
                ctx.arc(cx+sw/2, cy, r, -Math.PI/2, Math.PI/2);
                ctx.lineTo(cx-sw/2, cy+r);
                ctx.arc(cx-sw/2, cy, r, Math.PI/2, 3*Math.PI/2);
                ctx.closePath(); ctx.stroke();
                
                if (p.online) {
                    const prog = p.mark * 0.005;
                    const total = (sw * 2) + (Math.PI * r * 2);
                    let d = (prog % 1) * total;
                    let x, y;
                    
                    if (d < sw) { x = cx - sw/2 + d; y = cy - r; }
                    else if (d < sw + Math.PI*r) {
                        let a = (d - sw) / r - Math.PI/2;
                        x = cx + sw/2 + Math.cos(a)*r; y = cy + Math.sin(a)*r;
                    } else if (d < sw*2 + Math.PI*r) {
                        x = cx + sw/2 - (d - sw - Math.PI*r); y = cy + r;
                    } else {
                        let a = (d - sw*2 - Math.PI*r) / r + Math.PI/2;
                        x = cx - sw/2 + Math.cos(a)*r; y = cy + Math.sin(a)*r;
                    }

                    ctx.fillStyle = p.color;
                    ctx.shadowBlur = 15; ctx.shadowColor = p.color;
                    ctx.beginPath(); ctx.arc(x, y, 12, 0, 7); ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = "white"; ctx.font = "bold 10px sans-serif"; ctx.textAlign="center";
                    ctx.fillText(p.id, x, y + 4);
                }
            });
            requestAnimationFrame(draw);
        }
        draw();

        // Main Console Cleanup
        if (role === 'main') {
            setInterval(() => {
                const now = Date.now();
                players.forEach(p => { if(p.online && now - p.lastSeen > 5000) p.online = false; });
                updatePlayerListUI();
            }, 3000);
        }
    }
</script>
</body>
</html>
