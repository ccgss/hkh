<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>團隊搶答賽 - 隊伍同步版</title>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #000; --blue: #00ffff; --gold: #ffd700; --panel: rgba(25, 25, 25, 0.98); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        .page { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        .active-page { display: flex; }

        /* 主螢幕選單 */
        #menu-wrapper { position: fixed; top: 20px; right: 20px; z-index: 1000; display: none; }
        #menu-trigger { width: 55px; height: 55px; background: var(--blue); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 2px solid #fff; font-size: 24px; }
        #popup-panel { position: absolute; top: 65px; right: 0; width: 280px; background: var(--panel); border-radius: 12px; border: 1px solid #555; padding: 20px; display: none; }

        /* 團隊列表 */
        #player-section { width: 260px; background: #151515; padding: 15px; border-right: 2px solid #333; overflow-y: auto; }
        .team-card { background: #252525; padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 10px solid #444; }
        .team-ready { border-left-color: #00ff00; }

        /* iPad 介面 */
        .timer-container { width: 100%; height: 12px; background: #333; }
        #timer-bar { height: 100%; width: 100%; background: #ff4757; transition: width 0.1s linear; }
        .q-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; }
        .ans-grid { height: 350px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; background: #0a0a0a; }
        .ans-btn { border: none; border-radius: 15px; font-size: 1.8rem; font-weight: bold; color: white; transition: 0.2s; }
        
        /* 鎖定與反饋 */
        .ans-btn.correct { background: #2ed573 !important; box-shadow: 0 0 20px #2ed573; z-index: 5; }
        .ans-btn.wrong { background: #ff4757 !important; opacity: 0.4; }
        .ans-btn:disabled { color: rgba(255,255,255,0.8); }
        .locked-msg { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,0,0,0.8); padding: 20px; border-radius: 10px; display: none; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>

    <div id="menu-wrapper">
        <div id="menu-trigger" onclick="togglePopup()">⚙️</div>
        <div id="popup-panel">
            <button onclick="startGame()" style="width:100%; padding:15px; background:#ff4757; color:white; border:none; border-radius:8px; font-weight:bold;">開始同步競技</button>
        </div>
    </div>

    <div id="console-view" class="page">
        <header style="height:80px; background:#0a0a0a; display:flex; align-items:center; padding:0 30px; border-bottom:2px solid #333;">
            <h1 style="color:var(--blue); margin:0;">TEAM COLLABORATION QUIZ</h1>
            <div style="margin-left:auto; color:var(--gold);">隊友其中一人答題即可</div>
        </header>
        <div style="display:flex; flex:1;">
            <aside id="player-section"><h3>隊伍進度</h3><div id="player-list"></div></aside>
            <main id="playground-container" style="flex:1; position:relative;"><canvas id="canvasNeon"></canvas></main>
        </div>
    </div>

    <div id="lobby-view" class="page" style="justify-content:center; align-items:center;">
        <h1 style="color:var(--blue);">選擇隊伍</h1>
        <div id="team-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:20px; width:80%;"></div>
    </div>

    <div id="player-view" class="page">
        <div id="locked-banner" class="locked-msg">隊友已搶先作答！</div>
        <div class="timer-container"><div id="timer-bar"></div></div>
        <div style="padding:15px; display:flex; justify-content:space-between; background:#111;">
            <div id="p-label" style="color:var(--blue); font-weight:bold;">隊伍 --</div>
            <div id="p-score">隊伍總分: 0</div>
        </div>
        <div class="q-area"><div id="q-text" style="font-size:2rem; font-weight:bold;">等待隊友中...</div></div>
        <div class="ans-grid">
            <button class="ans-btn" style="background:#333" onclick="handleSelect(0)" id="opt-0">A</button>
            <button class="ans-btn" style="background:#333" onclick="handleSelect(1)" id="opt-1">B</button>
            <button class="ans-btn" style="background:#333" onclick="handleSelect(2)" id="opt-2">C</button>
            <button class="ans-btn" style="background:#333" onclick="handleSelect(3)" id="opt-3">D</button>
        </div>
    </div>

<script>
    const ROOM_ID = "TEAM_SYNC_2026";
    const BROKER = "wss://broker.emqx.io:8084/mqtt";
    const client = mqtt.connect(BROKER);
    const urlParams = new URLSearchParams(window.location.search);
    const role = (urlParams.get('role') || "").toLowerCase();

    // 隊伍進度現在由主控台統一管理
    let teams = Array.from({length: 8}, (_, i) => ({ id: i+1, count: 0, mark: 0, qIdx: 0, color: `hsl(${i*45}, 100%, 65%)`, locked: false }));
    let myTeamId = null, isStarted = false, timeLeft = 10, timerInterval = null;

    const questions = [
        { q: "15 + 24 = ?", a: ["37", "39", "41", "43"], correct: 1 },
        { q: "下列哪個是網頁的『骨架』？", a: ["CSS", "JS", "HTML", "PHP"], correct: 2 },
        { q: "ICT: 1KB 等於多少 Byte?", a: ["100", "512", "1000", "1024"], correct: 3 }
    ];

    client.on('connect', () => {
        if (role === 'main') {
            document.getElementById('menu-wrapper').style.display = 'block';
            client.subscribe(`game/${ROOM_ID}/join`);
            client.subscribe(`game/${ROOM_ID}/submit`);
            setInterval(() => client.publish(`game/${ROOM_ID}/state`, JSON.stringify({ teams, isStarted })), 400);
        } else {
            client.subscribe(`game/${ROOM_ID}/state`);
        }
    });

    client.on('message', (topic, msg) => {
        const data = JSON.parse(msg.toString());
        
        if (topic.endsWith('/state')) {
            const oldStarted = isStarted;
            teams = data.teams;
            isStarted = data.isStarted;

            if (myTeamId) {
                const myTeam = teams[myTeamId-1];
                // 如果隊伍已經滿員且遊戲開始
                if (isStarted && myTeam.count >= 2) {
                    if (!oldStarted) startNewQuestion(); 
                    syncTeamStatus(myTeam);
                } else if (myTeam.count >= 2) {
                    showPage('player-view'); // 等待開始
                }
                updateUI();
            }
        } else if (role === 'main') {
            if (topic.endsWith('/join')) {
                let t = teams[data.teamId-1];
                if (t && t.count < 2) t.count++;
            } else if (topic.endsWith('/submit')) {
                let t = teams[data.teamId-1];
                if (!t.locked && t.qIdx === data.qIdx) {
                    t.locked = true;
                    if (data.correct) t.mark += 100;
                    // 2秒後解鎖並換題
                    setTimeout(() => {
                        t.qIdx++;
                        t.locked = false;
                    }, 2000);
                }
            }
        }
    });

    // iPad: 同步隊伍作答狀態
    function syncTeamStatus(team) {
        if (team.locked) {
            document.getElementById('locked-banner').style.display = 'block';
            disableAllButtons(true);
            clearInterval(timerInterval);
        } else {
            document.getElementById('locked-banner').style.display = 'none';
            // 如果 qIdx 變了，代表進入新題目
            if (window.currentLocalQIdx !== team.qIdx) {
                window.currentLocalQIdx = team.qIdx;
                startNewQuestion();
            }
        }
    }

    function startNewQuestion() {
        showPage('player-view');
        const myTeam = teams[myTeamId-1];
        const q = questions[myTeam.qIdx % questions.length];
        
        document.getElementById('q-text').innerText = q.q;
        for(let i=0; i<4; i++) {
            const btn = document.getElementById(`opt-${i}`);
            btn.innerText = q.a[i];
            btn.className = "ans-btn";
            btn.disabled = false;
        }

        timeLeft = 10;
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            document.getElementById('timer-bar').style.width = (timeLeft * 10) + "%";
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                handleSelect(-1); // 時間到
            }
        }, 100);
    }

    function handleSelect(idx) {
        const myTeam = teams[myTeamId-1];
        if (myTeam.locked) return;

        const q = questions[myTeam.qIdx % questions.length];
        const correct = (idx === q.correct);
        
        // 顯示自己的反饋
        if (idx !== -1) {
            document.getElementById(`opt-${idx}`).classList.add(correct ? 'correct' : 'wrong');
            if (!correct) document.getElementById(`opt-${q.correct}`).classList.add('correct');
        }

        // 發送給主控台
        client.publish(`game/${ROOM_ID}/submit`, JSON.stringify({
            teamId: myTeamId,
            qIdx: myTeam.qIdx,
            correct: correct
        }));
    }

    function disableAllButtons(disabled) {
        for(let i=0; i<4; i++) document.getElementById(`opt-${i}`).disabled = disabled;
    }

    function joinTeam(id) {
        myTeamId = id;
        client.publish(`game/${ROOM_ID}/join`, JSON.stringify({ teamId: id }));
        showPage('player-view');
        document.getElementById('q-text').innerText = "等待另一名隊友加入...";
    }

    function updateUI() {
        if (role === 'main') {
            const list = document.getElementById('player-list');
            list.innerHTML = teams.map(t => `<div class="team-card ${t.count===2?'team-ready':''}">隊伍 ${t.id} (${t.count}/2) | 分數: ${t.mark}</div>`).join('');
        }
        if (myTeamId) {
            document.getElementById('p-label').innerText = `隊伍 ${myTeamId}`;
            document.getElementById('p-score').innerText = `隊伍總分: ${teams[myTeamId-1].mark}`;
        }
    }

    function startGame() { isStarted = true; togglePopup(); }
    function togglePopup() { const p = document.getElementById('popup-panel'); p.style.display = p.style.display==='block'?'none':'block'; }
    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page')); document.getElementById(id).classList.add('active-page'); }

    window.onload = () => {
        if (role !== 'player') {
            showPage('console-view');
            initCanvas();
        } else {
            showPage('lobby-view');
            const grid = document.getElementById('team-grid');
            for(let i=1; i<=8; i++) {
                grid.innerHTML += `<button onclick="joinTeam(${i})" style="padding:20px; font-size:1.5rem; background:#222; color:white; border-radius:10px;">隊伍 ${i}</button>`;
            }
        }
    };

    function initCanvas() {
        const can = document.getElementById('canvasNeon');
        const ctx = can.getContext('2d');
        const container = document.getElementById('playground-container');
        const resize = () => { can.width = container.clientWidth; can.height = container.clientHeight; };
        window.addEventListener('resize', resize); resize();
        function render() {
            ctx.clearRect(0, 0, can.width, can.height);
            teams.forEach((t, i) => {
                if (t.count > 0) {
                    const x = 50 + (t.mark % (can.width - 100));
                    ctx.fillStyle = t.color;
                    ctx.beginPath(); ctx.arc(x, (i+1)*(can.height/9), 20, 0, 7); ctx.fill();
                    ctx.fillStyle = "white"; ctx.fillText("Team "+t.id, x-20, (i+1)*(can.height/9)-25);
                }
            });
            requestAnimationFrame(render);
        }
        render();
    }
</script>
</body>
</html>
