<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Arena - Fixed Sync</title>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #000; --blue: #00ffff; --gold: #ffd700; --red: #ff3300; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        #mode-selector { 
            position: fixed; top: 0; left: 0; right: 0; height: 50px; background: #1a1a1a; 
            display: none; justify-content: center; align-items: center; gap: 20px; z-index: 9999; 
            border-bottom: 1px solid #444;
        }
        .mode-btn { padding: 5px 20px; border: 2px solid white; background: #444; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .mode-btn.active { background: var(--blue); color: #000; border-color: #000; }

        .page { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        #console-view.has-selector { padding-top: 50px; }
        .active-page { display: flex; }

        #game-header { height: 100px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; border-bottom: 4px solid var(--blue); }
        
        #main-layout { position: relative; flex: 1; width: 100%; display: flex; }
        #player-section { width: 240px; background: rgba(25,25,25,0.95); padding: 15px; border-right: 2px solid #333; overflow-y: auto; z-index: 20; }
        #playground { flex: 1; background: #000; }
        canvas { display: block; width: 100%; height: 100%; }

        /* Team Cards in Sidebar */
        .team-card { background: #222; padding: 12px; margin-bottom: 12px; border-radius: 8px; border-left: 10px solid #444; transition: all 0.3s; }
        .team-active { border-left-color: var(--blue); background: rgba(0,255,255,0.05); }
        .team-full { border-left-color: #00ff00; background: rgba(0,255,0,0.1); }

        /* iPad Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; width: 90%; max-width: 600px; }
        .team-select-btn { padding: 30px; font-size: 1.5rem; font-weight: bold; border-radius: 15px; border: 2px solid #444; background: #222; color: white; }
        .team-select-btn:disabled { opacity: 0.2; }
        .team-select-btn.joined { background: var(--blue); color: #000; border-color: white; }
    </style>
</head>
<body class="mode-neon">

    <div id="mode-selector">
        <button id="btn-neon" class="mode-btn active" onclick="switchMode('neon')">NEON DASH</button>
        <button id="btn-pnb" class="mode-btn" onclick="switchMode('pnb')">BUN HILL</button>
    </div>

    <div id="console-view" class="page">
        <header id="game-header">
            <div id="qrcode"></div>
            <div style="text-align:center">
                <h1 id="game-title" style="margin:0">NEON DASH</h1>
                <small id="conn-info" style="color:var(--blue)">INITIALIZING...</small>
            </div>
            <div id="timer" style="font-size:1.8rem; font-weight:bold;">TEAM RACE 🏁</div>
        </header>
        <div id="main-layout">
            <aside id="player-section">
                <h3 style="margin-top:0; border-bottom:1px solid #444">TEAM STATUS</h3>
                <div id="player-list">
                    </div>
            </aside>
            <main id="playground"><canvas id="trackCanvas"></canvas></main>
        </div>
    </div>

    <div id="lobby-view" class="page" style="align-items:center; justify-content:center; background:#050505;">
        <h1 style="color:var(--blue)">SELECT TEAM (MAX 2)</h1>
        <div id="team-grid" class="grid"></div>
    </div>

    <div id="player-view" class="page">
        <div id="p-header" style="padding:25px; text-align:center; font-size:2rem; background:#111; border-bottom:4px solid var(--blue);">TEAM X</div>
        <div class="grid" style="flex:1; margin: auto;">
            <button onclick="send(1)" style="background:#ff5252; height:200px; font-size:4rem; border-radius:30px; border:none; color:white;">A</button>
            <button onclick="send(2)" style="background:#448aff; height:200px; font-size:4rem; border-radius:30px; border:none; color:white;">B</button>
        </div>
    </div>

<script>
    const ROOM_ID = "TEAM_ARENA_SYNC_2026";
    const BROKER = "wss://broker.emqx.io:8084/mqtt";
    const client = mqtt.connect(BROKER);
    const urlParams = new URLSearchParams(window.location.search);
    const role = (urlParams.get('role') || "").toLowerCase();
    
    let currentGameMode = 'neon';
    let myTeamId = null;
    
    // Initialize 8 Teams
    let teams = Array.from({length: 8}, (_, i) => ({
        id: i + 1,
        count: 0,
        mark: 0,
        color: `hsl(${i * 45}, 100%, 65%)`,
        lastSeen: Date.now()
    }));

    client.on('connect', () => {
        document.getElementById('conn-info').innerText = "CONNECTED to MQTT";
        if (role === 'main') {
            document.getElementById('mode-selector').style.display = 'flex';
            document.getElementById('console-view').classList.add('has-selector');
            client.subscribe(`game/${ROOM_ID}/join`);
            client.subscribe(`game/${ROOM_ID}/action/+`);
            setInterval(broadcastState, 200);
        } else {
            client.subscribe(`game/${ROOM_ID}/state`);
        }
        updateUI(); // Force first UI render
    });

    client.on('message', (topic, msg) => {
        const data = JSON.parse(msg.toString());

        if (topic.endsWith('/state')) {
            currentGameMode = data.mode;
            teams = data.teams;
            updateUI();
        } 
        else if (role === 'main') {
            if (topic.endsWith('/join')) {
                const t = teams[data.teamId - 1];
                if (t && t.count < 2) {
                    t.count++;
                    updateUI(); // Update immediately for main console
                }
            } else if (topic.includes('/action/')) {
                const teamId = parseInt(topic.split('/').pop());
                const t = teams[teamId - 1];
                if (t && t.count > 0) {
                    t.mark += 15; // Movement speed
                }
            }
        }
    });

    function broadcastState() {
        if (role !== 'main') return;
        client.publish(`game/${ROOM_ID}/state`, JSON.stringify({ mode: currentGameMode, teams: teams }));
    }

    function switchMode(mode) { 
        if (role !== 'main') return;
        currentGameMode = mode; 
        document.getElementById('btn-neon').className = 'mode-btn' + (mode==='neon'?' active':'');
        document.getElementById('btn-pnb').className = 'mode-btn' + (mode==='pnb'?' active':'');
        broadcastState(); 
    }

    function sendJoin(id) {
        myTeamId = id;
        client.publish(`game/${ROOM_ID}/join`, JSON.stringify({ teamId: id }));
        document.getElementById('p-header').innerText = "TEAM " + id;
        showPage('player-view');
    }

    function send(code) {
        if (myTeamId) client.publish(`game/${ROOM_ID}/action/${myTeamId}`, JSON.stringify({ btn: code }));
    }

    function updateUI() {
        // Update Sidebar Info
        const list = document.getElementById('player-list');
        if (list) {
            list.innerHTML = teams.map(t => {
                let statusClass = t.count === 2 ? 'team-full' : (t.count === 1 ? 'team-active' : '');
                return `
                    <div class="team-card ${statusClass}">
                        <strong style="color:${t.color}">TEAM ${t.id}</strong><br>
                        <span style="font-size:0.8rem">Players: ${t.count}/2</span><br>
                        <div style="background:#444; height:5px; margin-top:5px;">
                            <div style="background:${t.color}; width:${(t.mark/1000)*100}%; height:100%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Update iPad Grid
        const grid = document.getElementById('team-grid');
        if (grid) {
            if (grid.children.length === 0) {
                for(let i=1; i<=8; i++) {
                    const b = document.createElement('button');
                    b.id = "btn-team-" + i;
                    b.className = "team-select-btn";
                    b.innerText = "TEAM " + i;
                    b.onclick = () => sendJoin(i);
                    grid.appendChild(b);
                }
            }
            teams.forEach(t => {
                const b = document.getElementById("btn-team-" + t.id);
                if (b) {
                    b.innerText = `TEAM ${t.id} (${t.count}/2)`;
                    b.disabled = (t.count >= 2 && myTeamId !== t.id);
                    if (myTeamId === t.id) b.classList.add('joined');
                }
            });
        }
    }

    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page')); document.getElementById(id).classList.add('active-page'); }

    function initCanvas() {
        const canvas = document.getElementById('trackCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('playground');
        const resize = () => { canvas.width = container.clientWidth; canvas.height = container.clientHeight; };
        window.addEventListener('resize', resize); resize();

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const laneH = canvas.height / 9;

            if (currentGameMode === 'neon') {
                for (let i = 0; i <= 8; i++) {
                    const y = (i + 0.5) * laneH;
                    ctx.strokeStyle = "rgba(0, 255, 255, 0.2)";
                    ctx.setLineDash([15, 15]);
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
                }
                ctx.setLineDash([]);
                ctx.strokeStyle = "var(--blue)"; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(80, 0); ctx.lineTo(80, canvas.height); ctx.stroke();
            } else {
                ctx.fillStyle = "rgba(100, 50, 0, 0.15)";
                for (let r=1; r<=2; r++) for(let c=1; c<=4; c++) {
                    const bx = (canvas.width/5)*c, by = (canvas.height/3)*r;
                    ctx.beginPath(); ctx.moveTo(bx, by-50); ctx.quadraticCurveTo(bx+40,by+30,bx-40,by+30); ctx.fill();
                }
            }

            teams.forEach((t, i) => {
                if (t.count > 0) {
                    const y = (i + 1) * laneH;
                    const x = Math.max(80, canvas.width - (t.mark % canvas.width));
                    
                    if (currentGameMode === 'pnb') {
                        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(x, y, 22, 0, 7); ctx.fill();
                        ctx.fillStyle = "red"; ctx.font = "bold 12px sans-serif"; ctx.textAlign="center";
                        ctx.fillText("T" + t.id, x, y+5);
                    } else {
                        ctx.fillStyle = t.color; ctx.shadowBlur = 20; ctx.shadowColor = t.color;
                        ctx.beginPath(); ctx.arc(x, y, 18, 0, 7); ctx.fill(); ctx.shadowBlur = 0;
                        ctx.fillStyle = "#000"; ctx.font = "bold 14px Arial"; ctx.textAlign="center";
                        ctx.fillText(t.id, x, y+5);
                    }
                }
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    window.onload = () => {
        if (role !== 'player') {
            showPage('console-view');
            new QRCode(document.getElementById("qrcode"), { 
                text: window.location.origin + window.location.pathname + "?role=player", 
                width: 80, height: 80 
            });
            initCanvas();
        } else {
            showPage('lobby-view');
        }
        updateUI(); // Immediate render
    };
</script>
</body>
</html>
