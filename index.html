<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Battle Quiz Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #000; --blue: #00ffff; --gold: #ffd700; --red: #ff4757; --green: #2ed573; --panel: rgba(25, 25, 25, 0.98); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; }
        
        /* 頁面切換 */
        .page { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        .active-page { display: flex; }

        /* 主螢幕 UI */
        .top-bar { height: 70px; background: #000; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; border-bottom: 2px solid #333; }
        #main-layout { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 300px; background: #111; border-right: 2px solid #333; padding: 20px; overflow-y: auto; }
        .team-card { background: #222; padding: 15px; margin-bottom: 12px; border-radius: 10px; border-left: 8px solid #444; }
        .team-card.ready { border-left-color: var(--green); background: #1a2a1a; }
        #playground { flex: 1; position: relative; background: #080808; }
        canvas { width: 100%; height: 100%; }

        /* 懸浮選單 */
        #menu-wrapper { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        #menu-trigger { width: 55px; height: 55px; background: var(--blue); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 2px solid #fff; font-size: 24px; box-shadow: 0 0 15px var(--blue); }
        #popup-panel { position: absolute; top: 65px; right: 0; width: 280px; background: var(--panel); border-radius: 15px; border: 1px solid #444; padding: 20px; display: none; }
        
        /* iPad UI */
        .lang-btn { background: #444; color: white; border: 1px solid #666; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .timer-wrap { width: 100%; height: 12px; background: #333; }
        #timer-bar { height: 100%; width: 100%; background: var(--red); transition: width 0.1s linear; }
        .q-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; }
        .ans-grid { height: 380px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; background: #000; }
        .ans-btn { border: none; border-radius: 15px; font-size: 1.8rem; font-weight: bold; color: white; background: #2a2a2a; transition: 0.2s; }
        .ans-btn.correct { background: var(--green) !important; box-shadow: 0 0 20px var(--green); }
        .ans-btn.wrong { background: var(--red) !important; opacity: 0.5; }
        
        #locked-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 100; justify-content: center; align-items: center; font-size: 2.5rem; color: var(--red); font-weight: bold; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="menu-wrapper" style="display:none;">
        <div id="menu-trigger" onclick="togglePopup()">⚙️</div>
        <div id="popup-panel">
            <div id="qrcode-area" style="background:white; padding:10px; text-align:center; margin-bottom:15px; min-height:140px;"></div>
            <button onclick="startGame()" style="width:100%; padding:15px; background:var(--red); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">START GAME / 開始遊戲</button>
        </div>
    </div>

    <div id="console-view" class="page">
        <header class="top-bar">
            <h2 style="color:var(--blue); margin:0;">TEAM BATTLE ARENA</h2>
            <div id="admin-status" style="color:var(--gold); font-weight:bold;">Waiting for Teams...</div>
        </header>
        <div id="main-layout">
            <aside id="sidebar">
                <h3 style="margin-top:0; border-bottom:1px solid #444; padding-bottom:10px;">隊伍進度 Status</h3>
                <div id="team-list-ui"></div>
            </aside>
            <main id="playground"><canvas id="mainCanvas"></canvas></main>
        </div>
    </div>

    <div id="lobby-view" class="page" style="justify-content:center; align-items:center; background:#050505;">
        <div style="position:absolute; top:20px; right:20px;">
            <button class="lang-btn" onclick="toggleLang()">繁 / 简</button>
        </div>
        <h1 id="ui-select-title" style="color:var(--blue); font-size:3rem; margin-bottom:40px;">選擇您的隊伍</h1>
        <div id="team-grid" style="display:grid; grid-template-columns:repeat(4, 1fr); gap:20px; width:90%; max-width:1000px;"></div>
    </div>

    <div id="player-view" class="page">
        <div id="locked-overlay">隊友已搶答！<br><span style="font-size:1.2rem;">Partner Answered!</span></div>
        <div class="top-bar">
            <div id="ui-team-label" style="font-weight:bold; color:var(--blue); font-size:1.5rem;">Team --</div>
            <button class="lang-btn" onclick="toggleLang()">繁 / 简</button>
            <div id="ui-score-label" style="font-weight:bold; font-size:1.5rem;">分數: 0</div>
        </div>
        <div class="timer-wrap"><div id="timer-bar"></div></div>
        <div class="q-display">
            <div id="ui-question" style="font-size:2.5rem; font-weight:bold;">Waiting for Admin...</div>
        </div>
        <div class="ans-grid">
            <button class="ans-btn" onclick="sendAns(0)" id="btn-0">A</button>
            <button class="ans-btn" onclick="sendAns(1)" id="btn-1">B</button>
            <button class="ans-btn" onclick="sendAns(2)" id="btn-2">C</button>
            <button class="ans-btn" onclick="sendAns(3)" id="btn-3">D</button>
        </div>
    </div>

<script>
    // --- 核心配置 ---
    const ROOM_ID = "TEAM_QUIZ_FINAL_GITHUB";
    const BROKER = "wss://broker.emqx.io:8084/mqtt";
    const client = mqtt.connect(BROKER);
    
    // 嚴格判定角色：網址必須有 ?role=player 才是 iPad
    const isPlayer = new URLSearchParams(window.location.search).get('role') === 'player';

    let currentLang = 'trad';
    const lang = {
        trad: { title: "選擇您的隊伍", score: "分數", wait: "等待開始...", locked: "隊友已搶答！", team: "隊伍" },
        simp: { title: "选择您的队伍", score: "分数", status: "等待开始...", locked: "队友已抢答！", team: "队伍" }
    };

    let teams = Array.from({length: 8}, (_, i) => ({ id: i+1, count: 0, mark: 0, qIdx: 0, locked: false, color: `hsl(${i*45}, 100%, 60%)` }));
    let gameActive = false, myTeamId = null, localQIdx = -1, timer = null;

    const quiz = [
        { q: "What is 20 + 35?", a: ["45", "50", "55", "60"], c: 2 },
        { q: "Which is a web browser?", a: ["Word", "Chrome", "Excel", "Spotify"], c: 1 },
        { q: "1024 KB is equal to?", a: ["1 MB", "1 GB", "1 TB", "1 Bit"], c: 0 },
        { q: "誰是『力學之父』？", a: ["愛因斯坦", "牛頓", "居禮夫人", "霍金"], c: 1 }
    ];

    // --- MQTT 邏輯 ---
    client.on('connect', () => {
        if (!isPlayer) {
            document.getElementById('menu-wrapper').style.display = 'block';
            client.subscribe(`game/${ROOM_ID}/join`);
            client.subscribe(`game/${ROOM_ID}/submit`);
            setInterval(() => client.publish(`game/${ROOM_ID}/state`, JSON.stringify({ teams, gameActive })), 500);
            setTimeout(renderQR, 1000);
        } else {
            client.subscribe(`game/${ROOM_ID}/state`);
        }
    });

    client.on('message', (topic, msg) => {
        const data = JSON.parse(msg.toString());
        if (topic.endsWith('/state')) {
            teams = data.teams;
            gameActive = data.gameActive;
            updateConsole();
            if (isPlayer && myTeamId) {
                const myT = teams[myTeamId-1];
                if (gameActive && myT.count >= 2) {
                    if (localQIdx !== myT.qIdx) { localQIdx = myT.qIdx; setupQ(); }
                    document.getElementById('locked-overlay').style.display = myT.locked ? 'flex' : 'none';
                    if (myT.locked) clearInterval(timer);
                }
                updatePlayerUI(myT);
            }
        } else if (!isPlayer) {
            if (topic.endsWith('/join')) {
                let t = teams[data.tId-1];
                if (t && t.count < 2) t.count++;
            } else if (topic.endsWith('/submit')) {
                let t = teams[data.tId-1];
                if (!t.locked && t.qIdx === data.qIdx) {
                    t.locked = true;
                    if (data.isCorrect) t.mark += 100;
                    setTimeout(() => { t.qIdx++; t.locked = false; }, 2000);
                }
            }
        }
    });

    // --- 界面控制 ---
    function toggleLang() {
        currentLang = (currentLang === 'trad') ? 'simp' : 'trad';
        document.getElementById('ui-select-title').innerText = lang[currentLang].title;
        if (myTeamId) updatePlayerUI(teams[myTeamId-1]);
    }

    function updatePlayerUI(myT) {
        const l = lang[currentLang];
        document.getElementById('ui-team-label').innerText = `${l.team} ${myTeamId}`;
        document.getElementById('ui-score-label').innerText = `${l.score}: ${myT.mark}`;
        document.getElementById('locked-overlay').innerHTML = `${l.locked}<br><span style="font-size:1.2rem;">Partner Answered!</span>`;
        if (!gameActive) document.getElementById('ui-question').innerText = l.status;
    }

    function setupQ() {
        showPage('player-view');
        const q = quiz[teams[myTeamId-1].qIdx % quiz.length];
        document.getElementById('ui-question').innerText = q.q;
        for(let i=0; i<4; i++) {
            const b = document.getElementById(`btn-${i}`);
            b.innerText = q.a[i];
            b.className = "ans-btn"; b.disabled = false;
        }
        let t = 10.0;
        if (timer) clearInterval(timer);
        timer = setInterval(() => {
            t -= 0.1;
            document.getElementById('timer-bar').style.width = (t * 10) + "%";
            if (t <= 0) sendAns(-1);
        }, 100);
    }

    function sendAns(idx) {
        const q = quiz[teams[myTeamId-1].qIdx % quiz.length];
        const isCorrect = (idx === q.c);
        if (idx !== -1) {
            document.getElementById(`btn-${idx}`).classList.add(isCorrect ? 'correct' : 'wrong');
            if (!isCorrect) document.getElementById(`btn-${q.c}`).classList.add('correct');
        }
        document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
        client.publish(`game/${ROOM_ID}/submit`, JSON.stringify({ tId: myTeamId, qIdx: localQIdx, isCorrect }));
    }

    function updateConsole() {
        if (isPlayer) return;
        document.getElementById('team-list-ui').innerHTML = teams.map(t => `
            <div class="team-card ${t.count>=2?'ready':''}">
                <b style="color:${t.color}">Team ${t.id}</b> | Score: ${t.mark}<br>
                Status: ${t.count}/2 Players
            </div>
        `).join('');
    }

    function joinTeam(id) {
        myTeamId = id;
        client.publish(`game/${ROOM_ID}/join`, JSON.stringify({ tId: id }));
        showPage('player-view');
        updatePlayerUI(teams[myTeamId-1]);
    }

    function startGame() { gameActive = true; togglePopup(); }
    function togglePopup() { const p = document.getElementById('popup-panel'); p.style.display = p.style.display==='block'?'none':'block'; }
    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page')); document.getElementById(id).classList.add('active-page'); }

    function renderQR() {
        const path = window.location.origin + window.location.pathname + "?role=player";
        new QRCode(document.getElementById('qrcode-area'), { text: path, width: 140, height: 140 });
    }

    window.onload = () => {
        if (isPlayer) {
            showPage('lobby-view');
            const grid = document.getElementById('team-grid');
            for(let i=1; i<=8; i++) grid.innerHTML += `<button onclick="joinTeam(${i})" style="padding:20px; background:#222; color:white; border-radius:10px; border:1px solid #444; font-weight:bold; cursor:pointer;">Team ${i}</button>`;
        } else {
            showPage('console-view');
            initCanvas();
        }
    };

    function initCanvas() {
        const can = document.getElementById('mainCanvas');
        const ctx = can.getContext('2d');
        const resize = () => { can.width = can.parentElement.clientWidth; can.height = can.parentElement.clientHeight; };
        window.onresize = resize; resize();
        function draw() {
            ctx.clearRect(0,0,can.width,can.height);
            teams.forEach((t, i) => {
                if (t.count > 0) {
                    const x = 60 + (t.mark % (can.width - 120));
                    const y = (i+1) * (can.height / 9);
                    ctx.fillStyle = t.color; ctx.beginPath(); ctx.arc(x, y, 22, 0, 7); ctx.fill();
                    ctx.fillStyle = "white"; ctx.font = "bold 14px sans-serif"; ctx.fillText("T"+t.id, x-10, y+5);
                }
            });
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>
