<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A Running Game Console</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-color: #1e1e1e;
            --accent-color: #00e676;
            --text-color: #ffffff;
            --track-gold: #ffd700;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* Section 1: Top Information */
        #game-header {
            height: 12vh;
            background: linear-gradient(180deg, #333, #111);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px;
            border-bottom: 4px solid var(--accent-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .header-item { text-align: center; }
        .header-item h2 { margin: 0; font-size: 0.9rem; color: var(--accent-color); text-transform: uppercase; }
        .header-item p { margin: 5px 0 0; font-family: 'Courier New', monospace; font-size: 1.6rem; font-weight: bold; }

        /* QR Code Container */
        #qr-container {
            display: flex; align-items: center;
            background: white; padding: 8px; border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,230,118,0.5);
        }
        #qrcode img { width: 70px; height: 70px; }

        /* Main Layout */
        #main-layout { display: flex; flex: 1; height: 88vh; }

        /* Section 2: Left Player List */
        #player-section {
            width: 380px;
            background-color: var(--panel-color);
            border-right: 2px solid #333;
            display: flex; flex-direction: column;
            padding: 15px; overflow-y: auto;
        }

        .player-card {
            background: #2a2a2a; border-radius: 10px;
            padding: 12px; margin-bottom: 12px;
            border-left: 6px solid #444;
            transition: transform 0.2s;
        }
        .player-card.active { border-left-color: var(--accent-color); background: #333; transform: scale(1.02); }
        .player-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .p-name { font-weight: bold; color: #fff; }
        .p-mark { color: var(--track-gold); font-weight: bold; font-size: 1.2rem; }
        .p-detail { font-size: 0.85rem; color: #bbb; line-height: 1.4; }
        .p-ans { color: #00b0ff; font-weight: bold; font-size: 1rem; }

        /* Section 3: Right Playground */
        #playground-section {
            flex: 1; position: relative;
            background: radial-gradient(circle, #252525 0%, #050505 100%);
            display: flex; justify-content: center; align-items: center;
        }
        canvas { filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }

        .ui-label {
            position: absolute; bottom: 15px; right: 20px;
            color: rgba(255,255,255,0.2); font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header id="game-header">
        <div class="header-item">
            <h2>Room Status</h2>
            <p id="status">ONLINE</p>
        </div>

        <div id="qr-container">
            <div id="qrcode"></div>
            <div style="color: #000; margin-left: 12px; text-align: left;">
                <div style="font-weight: bold; font-size: 0.7rem;">MOBILE JOIN</div>
                <div id="join-link" style="font-size: 0.55rem; color: #555; max-width: 120px; word-break: break-all;">Loading...</div>
            </div>
        </div>

        <div class="header-item">
            <h2>Current Question</h2>
            <p id="q-number">Q 01 / 10</p>
        </div>

        <div class="header-item">
            <h2>Time Left</h2>
            <p id="timer" style="color: #ff5252;">00:30</p>
        </div>
    </header>

    <div id="main-layout">
        <aside id="player-section">
            <h3 style="margin: 0 0 15px 0; color: var(--accent-color);">Leaderboard (Max 10)</h3>
            <div id="player-list">
                </div>
        </aside>

        <main id="playground-section">
            <canvas id="trackCanvas"></canvas>
            <div class="ui-label">Network Q&A Engine v1.0 | Capsule Layout</div>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('trackCanvas');
        const ctx = canvas.getContext('2d');
        const playerListContainer = document.getElementById('player-list');
        const bc = new BroadcastChannel('game_channel');

        // 核心數據結構
        let players = Array.from({ length: 10 }, (_, i) => ({
            id: i + 1,
            name: `Player ${String.fromCharCode(65 + i)}`,
            mark: 0,
            question: "Waiting for next question...",
            answer: "-",
            lane: i,
            progress: 0,
            color: `hsl(${i * 36}, 80%, 60%)`
        }));

        function init() {
            window.addEventListener('resize', resize);
            resize();
            generateQR();
            renderPlayerList();
            
            // 監聽來自 iPad (player.html) 的訊號
            bc.onmessage = (ev) => {
                if (ev.data.type === 'PLAYER_UPDATE') {
                    handlePlayerInput(ev.data.data);
                }
            };

            animate();
        }

        function generateQR() {
            const currentURL = window.location.href;
            const joinURL = currentURL.replace('index.html', '') + "player.html";
            document.getElementById('join-link').innerText = joinURL;
            new QRCode(document.getElementById("qrcode"), {
                text: joinURL,
                width: 70, height: 70
            });
        }

        function handlePlayerInput(data) {
            // 模擬：尋找對應玩家並更新
            const p = players.find(p => p.name.includes(data.name) || p.id == 1); // 測試用
            if (p) {
                p.answer = data.answer;
                p.mark += 10; // 每按一次加10分
                p.question = "Question 1: Processed!";
                renderPlayerList();
            }
        }

        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }

        function renderPlayerList() {
            // 按分數排序顯示
            const sorted = [...players].sort((a,b) => b.mark - a.mark);
            playerListContainer.innerHTML = sorted.map(p => `
                <div class="player-card ${p.mark > 0 ? 'active' : ''}">
                    <div class="player-header">
                        <span class="p-name">LANE ${p.lane + 1}: ${p.name}</span>
                        <span class="p-mark">${p.mark}</span>
                    </div>
                    <div class="p-detail">
                        Q: ${p.question}<br>
                        Selection: <span class="p-ans">${p.answer}</span>
                    </div>
                </div>
            `).join('');
        }

        function getCapsulePos(cx, cy, sw, r, progress) {
            const arc = Math.PI * r;
            const total = (sw * 2) + (arc * 2);
            let d = (progress % 1) * total;

            if (d < sw) return { x: cx - sw/2 + d, y: cy - r }; // Top Straight
            d -= sw;
            if (d < arc) { // Right Arc
                let a = -Math.PI/2 + (d/arc) * Math.PI;
                return { x: cx + sw/2 + Math.cos(a)*r, y: cy + Math.sin(a)*r };
            }
            d -= arc;
            if (d < sw) return { x: cx + sw/2 - d, y: cy + r }; // Bottom Straight
            d -= sw;
            // Left Arc
            let a = Math.PI/2 + (d/arc) * Math.PI;
            return { x: cx - sw/2 + Math.cos(a)*r, y: cy + Math.sin(a)*r };
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const sw = canvas.width * 0.4; // Straight width
            const baseR = 50;
            const gap = 22;

            // Draw 10 Lanes
            for (let i = 0; i < 10; i++) {
                const r = baseR + (i * gap);
                ctx.beginPath();
                ctx.strokeStyle = `rgba(255, 215, 0, ${0.1 + (i*0.05)})`;
                ctx.lineWidth = 1;
                ctx.arc(cx + sw/2, cy, r, -Math.PI/2, Math.PI/2);
                ctx.lineTo(cx - sw/2, cy + r);
                ctx.arc(cx - sw/2, cy, r, Math.PI/2, 3*Math.PI/2);
                ctx.closePath();
                ctx.stroke();
            }

            // Draw Players
            players.forEach((p, i) => {
                const r = baseR + (i * gap);
                // 目標進度根據分數計算，這裡做平滑動畫
                let targetProgress = p.mark / 100; 
                if (p.progress < targetProgress) p.progress += 0.005;

                const pos = getCapsulePos(cx, cy, sw, r, p.progress);

                // Glow Effect
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.color;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 10, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Label
                ctx.fillStyle = "white";
                ctx.font = "bold 12px Arial";
                ctx.fillText(p.name.charAt(p.name.length-1), pos.x - 4, pos.y + 4);
            });

            requestAnimationFrame(animate);
        }

        init();
    </script>
</body>
</html>
