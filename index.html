<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Quiz Master - Trad/Simp Switch</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #000; --blue: #00ffff; --gold: #ffd700; --red: #ff4757; --green: #2ed573; --panel: rgba(20, 20, 20, 0.98); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        .page { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        .active-page { display: flex; }

        /* --- 頂部控制列 --- */
        .top-bar { height: 60px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 2px solid #333; }
        .lang-btn { background: #444; color: white; border: 1px solid #666; padding: 6px 15px; border-radius: 5px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        
        /* --- 主螢幕控制 --- */
        #menu-wrapper { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        #menu-trigger { width: 50px; height: 50px; background: var(--blue); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 2px solid #fff; font-size: 20px; }
        #popup-panel { position: absolute; top: 60px; right: 0; width: 250px; background: var(--panel); border-radius: 10px; border: 1px solid #444; padding: 15px; display: none; }
        
        #main-layout { display: flex; flex: 1; }
        #player-sidebar { width: 260px; background: #111; border-right: 1px solid #333; padding: 15px; }
        .team-card { background: #222; padding: 10px; margin-bottom: 8px; border-radius: 5px; border-left: 5px solid #444; }
        .team-card.ready { border-left-color: var(--green); }
        #playground { flex: 1; position: relative; }
        canvas { width: 100%; height: 100%; }

        /* --- iPad 答題介面 --- */
        .timer-wrap { width: 100%; height: 10px; background: #222; }
        #timer-bar { height: 100%; width: 100%; background: var(--red); transition: width 0.1s linear; }
        .q-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; }
        .ans-grid { height: 320px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .ans-btn { border: none; border-radius: 12px; font-size: 1.6rem; font-weight: bold; color: white; background: #2a2a2a; }
        .ans-btn.correct { background: var(--green) !important; }
        .ans-btn.wrong { background: var(--red) !important; }
        
        #locked-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 100; justify-content: center; align-items: center; font-size: 2.2rem; color: var(--red); font-weight: bold; }
    </style>
</head>
<body>

    <div id="menu-wrapper" style="display:none;">
        <div id="menu-trigger" onclick="togglePopup()">⚙️</div>
        <div id="popup-panel">
            <div id="qrcode-area" style="background:white; padding:10px; text-align:center; margin-bottom:10px;"></div>
            <button onclick="sendStartSignal()" style="width:100%; padding:10px; background:var(--red); color:white; border:none; border-radius:5px; font-weight:bold;">START GAME / 開始遊戲</button>
        </div>
    </div>

    <div id="console-view" class="page">
        <header class="top-bar">
            <h3 style="color:var(--blue); margin:0;">QUIZ ARENA 2026</h3>
            <div id="game-status">Waiting for players...</div>
        </header>
        <div id="main-layout">
            <aside id="player-sidebar"><div id="player-list-container"></div></aside>
            <main id="playground"><canvas id="mainCanvas"></canvas></main>
        </div>
    </div>

    <div id="lobby-view" class="page" style="justify-content:center; align-items:center;">
        <div style="position:absolute; top:20px; right:20px;">
            <button class="lang-btn" onclick="toggleLang()">繁 / 简</button>
        </div>
        <h2 id="lang-select-team" style="color:var(--blue);">選擇您的隊伍</h2>
        <div id="team-grid" style="display:grid; grid-template-columns:repeat(4, 1fr); gap:15px; width:90%;"></div>
    </div>

    <div id="player-view" class="page">
        <div id="locked-overlay">隊友已搶答！</div>
        <div class="top-bar">
            <div id="ui-team-info" style="font-weight:bold; color:var(--blue);">Team --</div>
            <button class="lang-btn" onclick="toggleLang()">繁 / 简</button>
            <div id="ui-team-score">分數: 0</div>
        </div>
        <div class="timer-wrap"><div id="timer-bar"></div></div>
        <div class="q-display">
            <div id="ui-q-text" style="font-size:2rem; font-weight:bold;">等待開始...</div>
        </div>
        <div class="ans-grid">
            <button class="ans-btn" onclick="submitChoice(0)" id="btn-0">A</button>
            <button class="ans-btn" onclick="submitChoice(1)" id="btn-1">B</button>
            <button class="ans-btn" onclick="submitChoice(2)" id="btn-2">C</button>
            <button class="ans-btn" onclick="submitChoice(3)" id="btn-3">D</button>
        </div>
    </div>

<script>
    const ROOM_ID = "TEAM_QUIZ_ZH_FIXED";
    const BROKER = "wss://broker.emqx.io:8084/mqtt";
    const client = mqtt.connect(BROKER);
    const params = new URLSearchParams(window.location.search);
    const isPlayer = params.has('role');

    // 多語言詞庫 (介面切換使用)
    let currentLang = 'trad'; 
    const langLib = {
        trad: { selectTeam: "選擇您的隊伍", score: "分數", status: "等待開始...", locked: "隊友已搶答！", team: "隊伍" },
        simp: { selectTeam: "选择您的队伍", score: "分数", status: "等待开始...", locked: "队友已抢答！", team: "队伍" }
    };

    let teams = Array.from({length: 8}, (_, i) => ({ id: i+1, count: 0, mark: 0, qIdx: 0, locked: false, color: `hsl(${i*45}, 100%, 60%)` }));
    let gameActive = false, myTeamId = null, localQIdx = -1, timer = null;

    // 題庫範例：繁體、簡體、英文混雜
    const quizData = [
        { q: "What is 15 + 15?", a: ["20", "30", "40", "50"], c: 1 },
        { q: "Which company makes the iPhone?", a: ["Apple", "Samsung", "Sony", "Nokia"], c: 0 },
        { q: "誰發明了燈泡？", a: ["愛因斯坦", "愛迪生", "牛頓", "特斯拉"], c: 1 }
    ];

    client.on('connect', () => {
        if (!isPlayer) {
            document.getElementById('menu-wrapper').style.display = 'block';
            client.subscribe(`game/${ROOM_ID}/join`);
            client.subscribe(`game/${ROOM_ID}/submit`);
            setInterval(() => client.publish(`game/${ROOM_ID}/state`, JSON.stringify({ teams, gameActive })), 500);
            renderQR();
        } else {
            client.subscribe(`game/${ROOM_ID}/state`);
        }
    });

    client.on('message', (topic, msg) => {
        const data = JSON.parse(msg.toString());
        if (topic.endsWith('/state')) {
            teams = data.teams;
            gameActive = data.gameActive;
            updateConsoleUI();
            if (isPlayer && myTeamId) {
                const myT = teams[myTeamId-1];
                if (gameActive && myT.count >= 2) {
                    if (localQIdx !== myT.qIdx) { localQIdx = myT.qIdx; nextQ(); }
                    document.getElementById('locked-overlay').style.display = myT.locked ? 'flex' : 'none';
                    if (myT.locked) clearInterval(timer);
                }
                updateUIStrings(myT);
            }
        } else if (!isPlayer) {
            if (topic.endsWith('/join')) {
                let t = teams[data.tId-1];
                if (t && t.count < 2) t.count++;
            } else if (topic.endsWith('/submit')) {
                let t = teams[data.tId-1];
                if (!t.locked) {
                    t.locked = true;
                    if (data.isCorrect) t.mark += 100;
                    setTimeout(() => { t.qIdx++; t.locked = false; }, 2000);
                }
            }
        }
    });

    // 介面語言更新 (不影響題目)
    function updateUIStrings(myT) {
        const lang = langLib[currentLang];
        document.getElementById('lang-select-team').innerText = lang.selectTeam;
        document.getElementById('locked-overlay').innerText = lang.locked;
        document.getElementById('ui-team-info').innerText = `${lang.team} ${myTeamId}`;
        document.getElementById('ui-team-score').innerText = `${lang.score}: ${myT.mark}`;
        if (!gameActive) document.getElementById('ui-q-text').innerText = lang.status;
    }

    function toggleLang() {
        currentLang = (currentLang === 'trad') ? 'simp' : 'trad';
        if (myTeamId) updateUIStrings(teams[myTeamId-1]);
        else document.getElementById('lang-select-team').innerText = langLib[currentLang].selectTeam;
    }

    function nextQ() {
        showPage('player-view');
        const team = teams[myTeamId-1];
        const q = quizData[team.qIdx % quizData.length];
        
        // 題目顯示直接從題庫抓取，不經過翻譯過濾
        document.getElementById('ui-q-text').innerText = q.q;
        for(let i=0; i<4; i++) {
            document.getElementById(`btn-${i}`).innerText = q.a[i];
            document.getElementById(`btn-${i}`).className = "ans-btn";
            document.getElementById(`btn-${i}`).disabled = false;
        }

        let tLeft = 10.0;
        if (timer) clearInterval(timer);
        timer = setInterval(() => {
            tLeft -= 0.1;
            document.getElementById('timer-bar').style.width = (tLeft * 10) + "%";
            if (tLeft <= 0) submitChoice(-1);
        }, 100);
    }

    function submitChoice(idx) {
        const q = quizData[teams[myTeamId-1].qIdx % quizData.length];
        const isCorrect = (idx === q.c);
        if (idx !== -1) {
            document.getElementById(`btn-${idx}`).classList.add(isCorrect ? 'correct' : 'wrong');
            if (!isCorrect) document.getElementById(`btn-${q.c}`).classList.add('correct');
        }
        document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
        client.publish(`game/${ROOM_ID}/submit`, JSON.stringify({ tId: myTeamId, qIdx: localQIdx, isCorrect }));
    }

    function updateConsoleUI() {
        if (isPlayer) return;
        const container = document.getElementById('player-list-container');
        container.innerHTML = teams.map(t => `<div class="team-card ${t.count>=2?'ready':''}">Team ${t.id} (${t.count}/2) | Score: ${t.mark}</div>`).join('');
    }

    function joinTeam(id) {
        myTeamId = id;
        client.publish(`game/${ROOM_ID}/join`, JSON.stringify({ tId: id }));
        showPage('player-view');
        updateUIStrings(teams[myTeamId-1]);
    }

    function sendStartSignal() { gameActive = true; togglePopup(); }
    function togglePopup() { const p = document.getElementById('popup-panel'); p.style.display = p.style.display==='block'?'none':'block'; }
    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page')); document.getElementById(id).classList.add('active-page'); }

    window.onload = () => {
        if (!isPlayer) {
            showPage('console-view');
            initCanvas();
        } else {
            showPage('lobby-view');
            const grid = document.getElementById('team-grid');
            for(let i=1; i<=8; i++) grid.innerHTML += `<button onclick="joinTeam(${i})" style="padding:20px; background:#222; color:white; border-radius:10px; border:1px solid #444; font-weight:bold;">Team ${i}</button>`;
        }
    };

    function renderQR() {
        const path = window.location.origin + window.location.pathname + "?role=player";
        new QRCode(document.getElementById('qrcode-area'), { text: path, width: 140, height: 140 });
    }

    function initCanvas() {
        const can = document.getElementById('mainCanvas');
        const ctx = can.getContext('2d');
        const resize = () => { can.width = can.parentElement.clientWidth; can.height = can.parentElement.clientHeight; };
        window.onresize = resize; resize();
        function loop() {
            ctx.clearRect(0,0,can.width,can.height);
            teams.forEach((t, i) => {
                if (t.count > 0) {
                    const x = 60 + (t.mark % (can.width - 120));
                    const y = (i+1) * (can.height / 9);
                    ctx.fillStyle = t.color; ctx.beginPath(); ctx.arc(x, y, 20, 0, 7); ctx.fill();
                    ctx.fillStyle = "white"; ctx.fillText("T"+t.id, x-8, y+5);
                }
            });
            requestAnimationFrame(loop);
        }
        loop();
    }
</script>
</body>
</html>
